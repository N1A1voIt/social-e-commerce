<div class="lg:hidden w-screen h-screen ">
  <div class="w-full p-2  bg-transparent  fixed bottom-1 ">
    <div class="w-full bg-fotsy flex rounded-2xl px-5 flex-row gap-2 items-center justify-between">
      <app-nav-button icon="heroHome" [isActive]="true" href="/alll"></app-nav-button>
      <app-nav-button icon="heroHeart" href="/alll"></app-nav-button>
      <app-nav-button icon="heroBellAlert" href="/alll"></app-nav-button>
      <app-nav-button icon="heroUserCircle" href="/alll"> </app-nav-button>
      <app-nav-button icon="heroShoppingCart" href="/alll"> </app-nav-button>
    </div>
  </div>
  <router-outlet></router-outlet>
</div>
<div class="lg:flex flex-row h-screen w-screen hidden gap-4 p-3 bg-white">
  <aside
    class="hidden w-[70px] lg:flex flex-col items-center bg-fotsy text-black rounded-xl shadow-xl h-full">
    <!-- Side Nav Bar-->

    <div class="h-16 flex items-center w-full" >
      <!-- Logo Section -->
      <a class="h-6 w-6 mx-auto" href="">
        <div class="rounded-full bg-fotsy font-mono text-black justify-center flex items-center font-bold text-xl">
          <span>D</span>
        </div>
      </a>
    </div>

    <ul>
      <!-- Items Section -->
      <li class="hover:bg-gray-100" *ngFor="let menu of menuItems">
        <a
          href="{{menu.route}}"
          class="h-16 px-6 flex flex justify-center items-center w-full
					focus:text-orange-500">
          <ng-icon name="{{menu.icon}}"></ng-icon>
        </a>
      </li>
    </ul>

    <div class="mt-auto flex flex-col items-center w-full">
      <!-- Profile Section -->
      <a
        [routerLink]="['/delivery/space/profile']"
        title="Profile"
        class="h-16 w-10 mx-auto flex justify-center items-center
				w-full text-gray-600 hover:bg-gray-100 focus:text-orange-500 focus:outline-none rounded-lg transition-colors">
        <ng-icon name="heroUserCircle" size="24"></ng-icon>
      </a>
      <!-- Logout Section -->
      <button
        (click)="logout()"
        title="Logout"
        class="h-16 w-10 mx-auto flex justify-center items-center
				w-full text-gray-600 hover:bg-red-100 hover:text-red-500 focus:outline-none rounded-lg transition-colors">
        <ng-icon name="heroArrowRightOnRectangle" size="24"></ng-icon>
      </button>
    </div>

  </aside>
  <div class="flex-1 rounded-xl ">
    <router-outlet></router-outlet>
  </div>
</div>
