<div class="cont-box w-full flex  gap-5  justify-between items-center mt-2 p-2 rounded">
  <div class="flex items-center gap-4">
    <div class="rounded-full w-[30px] h-[30px] bg-purple-400 bg-opacity-40 flex items-center justify-center text-white font-bold">
      <span *ngIf="phone?.paymentMethodName">{{ phone.paymentMethodName.charAt(0) }}</span>
    </div>
    <div class="flex flex-col" style="letter-spacing: 1px">
      <h1 class="text-md font-semibold">{{ phone?.phoneNumber || '+' }}</h1>
      <p class="text-sm text-gray">{{ phone?.associatedName || '-' }}</p>
      <span class="items-center flex gap-2">
        <app-checkbox></app-checkbox>
        <span class="font-medium"> Activate</span>
      </span>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <button class="px-3 py-1 rounded bg-blue-600 text-white" (click)="edit.emit(phone)">Edit</button>
  </div>
</div>
