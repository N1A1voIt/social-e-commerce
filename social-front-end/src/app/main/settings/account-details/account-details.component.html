<div class="absolute top-0 right-0 bg-opacity-30 backdrop-blur bg-principal w-full h-full overflow-hidden">
  <div class=" h-[100vh] xl:w-[40vw] shadow-xl absolute bg-principal top-0 right-0 rounded-l-3xl z-20">

    <div class="flex justify-begin p-4 px-6 text-blackt items-center gap-5 font-mono font-bold text-xl border-b border-gray">
      <h1 class="text-gray flex justify-center items-center cursor-pointer" (click)="closeDetails()"><ng-icon name="heroXMark" size="20"></ng-icon></h1>
      <h1>Account details</h1>
    </div>
    <div class="flex gap-2 justify-center items-center p-4 px-6 w-full  border-b border-gray">
      <div class="flex gap-3 justify-center items-center ">
        <div class=" w-[50px] h-[50px] rounded-full overflow-hidden">
          <img width="50" src="assets/imgs/gustavo.jpeg" class="object-cover" alt="">
        </div>
        <div class="flex flex-col">
          <h1 class="text-2xl">David Halloway</h1>
          <p class="text-gray text-md">david&#64;gmail.com</p>
        </div>
      </div>
      <div class="flex-1 h-full flex justify-end">
        <div class="h-[30px] w-[30px] rounded-full border border-gray p-3">

        </div>
      </div>
    </div>
    <app-contacts class="w-full"></app-contacts>
    <app-managed-account></app-managed-account>
  </div>
  <div *ngIf="formApply === 'contacts'" class="w-[30vw] h-full absolute px-2 flex justify-center items-center transform translate-x-full transition-transform duration-300 ease-in-out" >
    <div class="bg-cardbg rounded-3xl w-[100%] h-[100%] shadow relative">
      <div class="flex justify-between w-full p-4 px-6 text-blackt items-center gap-5 font-mono font-bold text-xl border-b border-gray">
        <div>
          <h1 class="text-gray"></h1>
          <h1>Edit your contacts</h1>
        </div>
        <div class="text-xl  flex justify-center items-center">
          <ng-icon name="heroPlusCircle" size="30" class="cursor-pointer"></ng-icon>
        </div>
      </div>
    </div>
  </div>
  <div *ngIf="formApply === 'accounts'" class="w-[30vw] h-full absolute px-2 flex justify-center items-center transform translate-x-full transition-transform duration-300 ease-in-out" >
    <div class="bg-cardbg rounded-3xl w-[100%] h-[100%] shadow relative">
      <div class="flex justify-between w-full p-4 px-6 text-blackt items-center gap-5 font-mono font-bold text-xl border-b border-gray">
        <div>
          <h1 class="text-gray"></h1>
          <h1>Edit your accounts</h1>
        </div>
        <div class="text-xl  flex justify-center items-center">
          <ng-icon name="heroPlusCircle" size="30" class="cursor-pointer"></ng-icon>
        </div>
      </div>
    </div>
  </div>
</div>
