<div class="flex flex-col w-full gap-3">
  <div class="cont-box w-full flex gap-5 py-2 justify-start mt-2 p-2 cursor-pointer hover:border hover:border-fotsy rounded-2xl" (click)="pageSelection(page)" *ngFor="let page of pages ">
    <div class="rounded-full w-[30px] h-[30px] bg-opacity-40 overflow-hidden">
      <img width="30" [src]="page.associatedMedia" alt="{{ page.pageTitle }}">
    </div>
    <div class="flex flex-col" style="letter-spacing: 1px">
      <a class="text-md font-semibold">&#64;{{ page.pageTitle }}</a>
      <p  class="text-sm text-gray">{{ page.platform }}</p>
    </div>
  </div>
</div>
