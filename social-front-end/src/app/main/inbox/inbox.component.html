<div class="">
</div>
<div class="flex h-full flex-col md:grid md:grid-cols-12 gap-4">
  <!-- Conversation List - Hidden on mobile when chat is active -->

  <div class="md:col-span-4 h-full bg-white relative rounded-3xl p-4 md:p-6 md:py-8 overflow-y-auto hide-scrollbar conversation-list"
       [ngClass]="{'hidden': showChatOnMobile, 'block': !showChatOnMobile, 'md:block': true}">
    <div class="w-full h-full bg-white absolute top-0 left-0 z-50 p-4" *ngIf="showPageList">
      <div class="flex justify-between items-center relative py-4 border-b border-fotsy">
        <h1 class="text-xl md:text-xl font-bold font-mono" style="letter-spacing: 1px">Profiles</h1>
        <div class="">
          <span (click)="showPageList = false">X</span>
        </div>
      </div>
      <app-page-list (selectPage)="changePage($event)"  [pages]="pages" ></app-page-list>
    </div>
    <div class="flex justify-between items-center relative">
      <h1 class="text-xl md:text-2xl font-bold font-mono" style="letter-spacing: 1px">Inbox</h1>
      <div class="w-[50px] h-[50px] bg-black rounded-full" (click)="showPageList = true">

      </div>
    </div>

<!--    <div class="grid grid-cols-2 mt-4 gap-3 bg-fotsy w-full rounded-xl p-2 font-bold" style="letter-spacing: 1px">-->
<!--      <div class="col-span-1 flex justify-center items-center p-2 bg-white rounded-xl shadow-sm">-->
<!--        <span>General</span>-->
<!--      </div>-->
<!--      <div class="col-span-1 flex justify-center items-center p-2 text-zinc-500 rounded-xl">-->
<!--        <span>Total</span>-->
<!--      </div>-->
<!--    </div>-->

    <div class="w-full flex flex-col justify-center items-center mt-4 gap-3">
      <!-- Conversation items with hover effects -->
      <div class="w-full profile flex items-center gap-4 bg-fotsy p-3 rounded-xl hover:bg-gray-100 transition-colors cursor-pointer" *ngFor="let conversation of inbox.mothers"
           (click)="toggleChatView()">
        <div class="relative">
          <div class="rounded-full overflow-hidden w-[50px] h-[50px]">
            <img src="{{ conversation.mediaUrl }}" alt="{{conversation.mediaUrl}}" class="w-full h-full object-cover">
          </div>
          <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
        </div>
        <div class="flex flex-col gap-1 justify-start flex-grow">
          <div class="flex justify-between items-center w-full">
            <span class="text-lg font-bold" style="letter-spacing:1px">{{ conversation.name }}</span>
            <span class="text-xs text-gray-500">2m</span>
          </div>
          <div class="flex justify-between items-center w-full">
            <span class="text-sm font-light text-zinc-500 truncate">{{conversation.platform}}</span>
<!--            <div class="w-5 h-5 rounded-full bg-orange flex items-center justify-center">-->
<!--              <span class="text-xs text-white">2</span>-->
<!--            </div>-->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="md:col-span-8 h-full bg-white rounded-3xl flex flex-col"
       [ngClass]="{'hidden': !showChatOnMobile, 'block': showChatOnMobile, 'md:block': true, 'md:h-full': true}">
    <!-- Chat Header with back button for mobile -->
    <div class="w-full flex items-center gap-3 border-b border-fotsy p-4 md:py-6 md:px-6">
      <button class="md:hidden mr-2 text-xl" (click)="toggleChatView()">
        <i class="pi pi-arrow-left"></i>
      </button>
      <div class="relative">
        <div class="rounded-full overflow-hidden w-[45px] h-[45px] md:w-[50px] md:h-[50px]">
          <img src="assets/imgs/gustavo.jpeg" alt="Profile" class="w-full h-full object-cover">
        </div>
        <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
      </div>
      <div class="flex flex-col justify-start flex-grow">
        <span class="text-lg md:text-xl font-bold" style="letter-spacing:1px">Charlotte</span>
        <span class="text-sm font-light text-zinc-500">Active now • Instagram</span>
      </div>
      <div class="flex gap-3">
        <button class="text-xl p-2 rounded-full hover:bg-fotsy">
          <i class="pi pi-phone"></i>
        </button>
        <button class="text-xl p-2 rounded-full hover:bg-fotsy">
          <i class="pi pi-video"></i>
        </button>
        <button class="text-xl p-2 rounded-full hover:bg-fotsy">
          <i class="pi pi-ellipsis-h"></i>
        </button>
      </div>
    </div>

    <div class="flex flex-col flex-grow relative h-full">
      <!-- Scrollable messages container -->
      <div class="flex-grow overflow-y-auto px-4 md:px-6 space-y-3 py-4 hide-scrollbar">
        <!-- Date separator -->
        <div class="flex justify-center my-4">
          <div class="px-4 py-1 bg-gray-100 rounded-full text-xs text-gray-500">Today</div>
        </div>

        <!-- Received message -->
        <div class="flex items-end gap-2 max-w-[80%]">
          <div class="rounded-full overflow-hidden w-[30px] h-[30px] flex-shrink-0">
            <img src="assets/imgs/gustavo.jpeg" alt="Profile" class="w-full h-full object-cover">
          </div>
          <div class="flex flex-col">
            <div class="bg-fotsy py-2 px-4 rounded-t-2xl rounded-br-2xl shadow-sm">
              <p class="text-blackt">Hi there! How are you doing today?</p>
            </div>
            <span class="text-xs text-gray-500 mt-1">10:20</span>
          </div>
        </div>

        <!-- Sent message -->
        <div class="flex flex-col items-end ml-auto max-w-[80%]">
          <div class="bg-orange text-fotsy py-2 px-4 rounded-t-2xl rounded-bl-2xl shadow-sm">
            <p>I'm doing great, thanks for asking! How about you?</p>
          </div>
          <div class="flex items-center gap-1 mt-1">
            <span class="text-xs text-gray-500">10:22</span>
            <i class="pi pi-check-circle text-xs text-blue-500"></i>
          </div>
        </div>

        <!-- Received message -->
        <div class="flex items-end gap-2 max-w-[80%]">
          <div class="rounded-full overflow-hidden w-[30px] h-[30px] flex-shrink-0">
            <img src="assets/imgs/gustavo.jpeg" alt="Profile" class="w-full h-full object-cover">
          </div>
          <div class="flex flex-col">
            <div class="bg-fotsy py-2 px-4 rounded-t-2xl rounded-br-2xl shadow-sm">
              <p class="text-blackt">I'm good too! Just working on some new projects.</p>
            </div>
            <span class="text-xs text-gray-500 mt-1">10:25</span>
          </div>
        </div>

        <!-- Typing indicator - only shown when isTyping is true -->
        <div *ngIf="isTyping" class="flex items-end gap-2 max-w-[80%]">
          <div class="rounded-full overflow-hidden w-[30px] h-[30px] flex-shrink-0">
            <img src="assets/imgs/gustavo.jpeg" alt="Profile" class="w-full h-full object-cover">
          </div>
          <div class="flex flex-col">
            <div class="bg-fotsy py-3 px-4 rounded-t-2xl rounded-br-2xl shadow-sm">
              <div class="typing-indicator">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="h-[70px] bg-gray-50 flex w-full items-center gap-2 border-t border-fotsy px-4 md:px-6">
        <button class="text-xl p-2 rounded-full hover:bg-fotsy text-gray-500">
          <i class="pi pi-plus"></i>
        </button>
        <button class="text-xl p-2 rounded-full hover:bg-fotsy text-gray-500">
          <i class="pi pi-image"></i>
        </button>
        <div class="flex-grow bg-fotsy rounded-full px-4 py-2">
          <input
            type="text"
            class="w-full bg-transparent text-blackt outline-none"
            placeholder="Type a message..."
            [(ngModel)]="message"
            (input)="onMessageInput($event)"
            (keyup.enter)="sendMessage()"
          >
        </div>
        <button
          class="text-xl p-3 rounded-full bg-orange text-white flex justify-center items-center"
          [ngClass]="{'opacity-50': !message.trim(), 'cursor-not-allowed': !message.trim()}"
          [disabled]="!message.trim()"
          (click)="sendMessage()"
        >
          <i class="pi pi-send"></i>
        </button>
      </div>
    </div>
  </div>
</div>
