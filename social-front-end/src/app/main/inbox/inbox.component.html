<div class="flex h-full flex-col md:grid md:grid-cols-12 gap-0">
  <!-- Conversation List - Hidden on mobile when chat is active -->

  <div class="md:col-span-4 h-full bg-white relative border border-rose-50 p-4 md:p-6 md:py-8 overflow-y-scroll hide-scrollbar conversation-list"
       [ngClass]="{'hidden': showChatOnMobile, 'block': !showChatOnMobile, 'md:block': true}">
    <div class="w-full h-full bg-white absolute top-0 left-0 z-50 p-4" *ngIf="showPageList">
      <div class="flex justify-between items-center relative py-4 border-b border-fotsy">
        <h1 class="text-xl md:text-xl font-bold font-mono" style="letter-spacing: 1px">Profiles</h1>
        <div class="">
          <span (click)="showPageList = false">X</span>
        </div>
      </div>
      <app-page-list (selectPage)="changePage($event)"  [pages]="pages" ></app-page-list>
    </div>
    <div class="flex justify-between items-center relative">
      <h1 class="text-xl md:text-xl font-bold font-mono " style="letter-spacing: 1px">Inbox </h1>
<!--      <div class="w-[50px] h-[50px] border flex justify-center items-center font-bold cursor-pointer rounded-full" (click)="showPageList = true">-->
<!--        <i class="pi pi-list"></i>-->
<!--      </div>-->
    </div>
    <div class="w-full flex overflow-y-scroll gap-4 py-3">
<!--      <div class="border rounded-full p-3" >-->
<!--        <span><img src="{{page.}}" alt=""></span>-->
<!--        <span>General</span>-->
      <div
        class="w-auto rounded-full bg-fotsy border-blackt py-1 px-3 shadow font-semibold
         cursor-pointer max-w-[150px] font-sans flex flex-row gap-2 items-center text-xs"
        style="letter-spacing: 1px"
        *ngFor="let page of pages"
        [ngClass]="{
          'border-2 border-blue-500': page.platform === 'facebook',
          'border-2 border-pink-500': page.platform === 'instagram'
        }"
        (click)="changePage(page)"
      >

      <div class="w-[25px] h-[25px] overflow-hidden rounded-full">
            <img src="{{page.associatedMedia}}" class="object-cover" width="25" alt="">
          </div>
          <h1 class="truncate whitespace-nowrap overflow-hidden min-w-0">
            {{ page.pageTitle }}
          </h1>
        </div>
<!--      </div>-->
    </div>

<!--    <div class="grid grid-cols-2 mt-4 gap-3 bg-fotsy w-full rounded-xl p-2 font-bold" style="letter-spacing: 1px">-->
<!--      <div class="col-span-1 flex justify-center items-center p-2 bg-white rounded-xl shadow-sm">-->
<!--        <span>General</span>-->
<!--      </div>-->
<!--      <div class="col-span-1 flex justify-center items-center p-2 text-zinc-500 rounded-xl">-->
<!--        <span>Total</span>-->
<!--      </div>-->
<!--    </div>-->

    <div class="w-full flex flex-col justify-center items-center mt-4 gap-3">
      <!-- Conversation items with hover effects -->
      <div class="w-full profile border border-blue-50 flex items-center gap-4 bg-fotsy p-3 rounded-xl hover:bg-gray-100 transition-colors cursor-pointer" (click)="fetchMessages(conversation)" *ngFor="let conversation of inbox.mothers">
        <div class="relative">
          <div class="rounded-full overflow-hidden w-[50px] h-[50px]">
            <img src="{{ conversation.mediaUrl }}" alt="{{conversation.mediaUrl}}" class="w-full h-full object-cover">
          </div>
          <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
        </div>
        <div class="flex flex-col gap-1 justify-start flex-grow">
          <div class="flex justify-between items-center w-full">
            <span class="text-lg font-bold" style="letter-spacing:1px">{{ conversation.name }}</span>
            <span class="text-xs text-gray-500">2m</span>
          </div>
          <div class="flex justify-between items-center w-full">
            <span class="text-sm font-light text-zinc-500 truncate">{{conversation.platform}}</span>
<!--            <div class="w-5 h-5 rounded-full bg-orange flex items-center justify-center">-->
<!--              <span class="text-xs text-white">2</span>-->
<!--            </div>-->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Area -->
  <div
    class="md:col-span-8 h-full bg-white rounded-3xl flex flex-col overflow-hidden relative"
    [ngClass]="{'hidden': !showChatOnMobile, 'block': showChatOnMobile, 'md:block': true, 'md:h-full': true}"
  >
    <div class="w-full flex items-center gap-3 border-b border-fotsy p-4 md:py-6 md:px-6 flex-shrink-0 shadow-[0_1px_3px_-1px_rgba(0,0,0,0.4)]" *ngIf="actualCustomer">
      <button class="md:hidden mr-2 text-xl" (click)="toggleChatView()">
        <i class="pi pi-arrow-left"></i>
      </button>
      <div class="w-full flex items-begin justify-center gap-3">
        <div class="relative">
          <div class="rounded-full overflow-hidden w-[45px] h-[45px] md:w-[50px] md:h-[50px]">
            <img src="{{actualCustomer.mediaUrl}}" alt="Profile" class="w-full h-full object-cover">
          </div>
          <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
        </div>
        <div class="flex flex-col justify-start flex-grow">
          <div class="flex gap-2 items-center">
            <span class="text-md md:text-md font-bold" style="letter-spacing:1px">{{ actualCustomer.name }}</span>
            <span class="text-sm font-light  bg-blue-500 bg-opacity-20 px-3 py-1 rounded-full text-blue-500 flex items-center gap-1"> <i class="pi pi-mobile"></i> {{actualCustomer.platform}}</span>
          </div>
          <span class="text-sm font-light text-zinc-500"> Online</span>
        </div>
<!--        <div class="flex gap-3">-->
<!--          <span class="text-sm font-light text-zinc-500"> {{actualCustomer.platform}}</span>-->
<!--        </div>-->
      </div>
    </div>

    <div class="flex-2 overflow-y-auto" *ngIf="actualCustomer">
      <div class="px-4 md:px-6 space-y-3 py-4 hide-scrollbar">
        <div class="flex justify-center my-4">
          <div class="px-4 py-1 bg-gray-100 rounded-full text-xs text-gray-500">Today</div>
        </div>

        <div class="w-full" *ngFor="let message of messages">
          <div class="flex items-end gap-2 max-w-[80%] relative" *ngIf="message.fromPlatform">
            <div class="rounded-full overflow-hidden w-[30px] h-[30px] flex-shrink-0">
              <img src="{{ actualCustomer.mediaUrl }}" alt="Profile" class="w-full h-full object-cover">
            </div>
            <div class="flex flex-col relative">
              <div class="bg-blue-50 py-3 px-6 rounded-t-2xl rounded-br-2xl shadow-sm">
                <p class="text-blackt">{{message.message}}</p>
              </div>
              <div class="flex items-center justify-between mt-1">
                <span class="text-xs text-gray-500">{{ getFormattedDate(message.createdAt)}}</span>
                <button
                  class="ml-2 px-2 py-1 bg-zinc-500 hover:bg-zinc-600 text-white text-xs rounded-full transition-colors duration-200 flex items-center gap-1"
                  title="Extract order"
                  (click)="analyzeMessage(message.message)"
                >
                  <i class="pi pi-sparkles"></i>
                  AI
                </button>
              </div>
            </div>
          </div>

          <div class="flex flex-col items-end ml-auto max-w-[80%]" *ngIf="!message.fromPlatform">
            <div class="bg-blue-400 text-fotsy py-2 px-4 rounded-t-2xl rounded-bl-2xl shadow-sm">
              <p>{{ message.message }}</p>
            </div>
            <div class="flex items-center gap-1 mt-1">
              <span class="text-xs text-gray-500">{{  getFormattedDate(message.createdAt)}}</span>
            </div>
          </div>
        </div>

        <div *ngIf="isTyping" class="flex items-end gap-2 max-w-[80%]">
          <div class="rounded-full overflow-hidden w-[30px] h-[30px] flex-shrink-0">
            <img src="{{ actualCustomer.mediaUrl }}" alt="Profile" class="w-full h-full object-cover">
          </div>
          <div class="flex flex-col">
            <div class="bg-fotsy py-3 px-4 rounded-t-2xl rounded-br-2xl shadow-sm">
              <div class="typing-indicator">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="h-[100px] w-full grid grid-cols-3 items-center gap-2 border-t border-fotsy bg-blue-50 px-4 md:px-6 py-8" *ngIf="actualCustomer">
      <!-- Left buttons -->
      <div class="flex gap-2  w-full col-span-3">
<!--        <button class="text-xl p-2 rounded-full hover:bg-fotsy text-gray-500">-->
<!--          <i class="pi pi-plus"></i>-->
<!--        </button>-->
<!--        <button class="text-xl p-2 rounded-full hover:bg-fotsy text-gray-500">-->
<!--          <i class="pi pi-image"></i>-->
<!--        </button>-->
        <div class="bg-fotsy rounded-full px-4 py-2 w-full">
          <input
            type="text"
            class="w-full bg-transparent text-blackt outline-none"
            placeholder="Type a message..."
            [(ngModel)]="message"
            (input)="onMessageInput($event)"
            (keyup.enter)="sendMessage()"
          >
        </div>

        <!-- Send button -->
        <button
          class="text-xl p-3 rounded-full bg-yellow text-white flex justify-center items-center"
          [ngClass]="{'opacity-50': !message.trim(), 'cursor-not-allowed': !message.trim()}"
          [disabled]="!message.trim()"
          (click)="sendMessage()"
        >
          <i class="pi pi-send"></i>
        </button>
      </div>

      <!-- Middle input -->

    </div>

  </div>
</div>

<app-inbox-popup [orderMessage]="orderMessage" [inbox]="inbox" [showForm]="openPopup" (closePopup)="openPopup = false" [variants]="orderPreview" [isLoading]="loadingOrders"></app-inbox-popup>
