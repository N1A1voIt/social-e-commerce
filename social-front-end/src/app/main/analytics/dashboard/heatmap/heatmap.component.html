<div style="display:block; " class="w-full  bg-blue-50 p-4 rounded-3xl font-mono flex flex-col" >
  <!-- Header with Year Selector -->
  <div class="w-full flex justify-between items-start mb-4">
    <div>
      <span class="text-sm font-semibold text-gray-700">User Engagement Activity</span>
      <span class="block text-xs text-gray-500 mt-0.5">{{ getTotalLikes() }} reactions received in {{ selectedYear }}</span>
    </div>
    <div class="flex items-center gap-2">
      <button
        (click)="previousYear()"
        class="p-1.5 hover:bg-gray-100 rounded transition-colors"
        [disabled]="!canGoPreviousYear()"
        [class.opacity-50]="!canGoPreviousYear()"
        [class.cursor-not-allowed]="!canGoPreviousYear()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
      </button>

      <select
        [(ngModel)]="selectedYear"
        (change)="onYearChange()"
        class="px-3 py-1.5 text-sm font-medium border border-gray-300 rounded-lg bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent cursor-pointer hover:border-gray-400 transition-colors">
        <option *ngFor="let year of availableYears" [value]="year">{{ year }}</option>
      </select>

      <button
        (click)="nextYear()"
        class="p-1.5 hover:bg-gray-100 rounded transition-colors"
        [disabled]="!canGoNextYear()"
        [class.opacity-50]="!canGoNextYear()"
        [class.cursor-not-allowed]="!canGoNextYear()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Heatmap Chart -->
  <div class="flex-1 w-full overflow-x-auto overflow-y-hidden" style="min-height: 180px;">
    <div [style.min-width]="getMinChartWidth()" style="height: 180px;">
      <canvas baseChart
              [data]="heatmapChartData"
              [options]="heatmapChartOptions"
              [type]="heatmapChartType">
      </canvas>
    </div>
  </div>

  <!-- Legend -->
  <div class="flex items-center justify-end gap-2 mt-3 text-xs text-gray-600">
    <span>Less</span>
    <div class="flex gap-1">
      <div class="w-3 h-3 rounded-sm" style="background-color: #EBEDF0;"></div>
      <div class="w-3 h-3 rounded-sm" style="background-color: #9BE9A8;"></div>
      <div class="w-3 h-3 rounded-sm" style="background-color: #40C463;"></div>
      <div class="w-3 h-3 rounded-sm" style="background-color: #30A14E;"></div>
      <div class="w-3 h-3 rounded-sm" style="background-color: #216E39;"></div>
    </div>
    <span>More</span>
  </div>
</div>
