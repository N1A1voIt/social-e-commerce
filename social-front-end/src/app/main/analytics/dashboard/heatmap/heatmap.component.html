<div style="display:block;" class="w-full bg-white p-4 rounded-3xl font-mono flex flex-col border border-gray-100 shadow-sm">
  <!-- Summary Header (Optional, pure display) -->
  <div class="mb-4">
    <span class="text-sm font-semibold text-gray-700">Contribution Activity</span>
    <span class="block text-xs text-gray-500 mt-0.5">{{ getTotalLikes() }} reactions in this period</span>
  </div>

  <!-- Heatmap Chart -->
  <div class="flex-1 w-full overflow-x-auto overflow-y-hidden" style="min-height: 160px;">
    <!-- Dynamic width based on weeks to ensure square cells -->
    <div style="height: 160px;">
      <canvas baseChart
              [data]="heatmapChartData"
              [options]="heatmapChartOptions"
              [type]="heatmapChartType">
      </canvas>
    </div>
  </div>

  <!-- GitHub Style Legend -->
  <div class="flex items-center justify-end gap-2 mt-2 text-xs text-gray-600">
    <span>Less</span>
    <div class="flex gap-1">
      <div class="w-3 h-3 rounded-sm" style="background-color: #EBEDF0;"></div>
      <div class="w-3 h-3 rounded-sm" style="background-color: #9BE9A8;"></div>
      <div class="w-3 h-3 rounded-sm" style="background-color: #40C463;"></div>
      <div class="w-3 h-3 rounded-sm" style="background-color: #30A14E;"></div>
      <div class="w-3 h-3 rounded-sm" style="background-color: #216E39;"></div>
    </div>
    <span>More</span>
  </div>
</div>
