<app-form-container [isVisible]="true" (closeForm)="close.emit()" [title]="label">
    <form [formGroup]="formGroup" (ngSubmit)="onSubmit()" class="p-6 space-y-6 w-full">

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="p-4 bg-red-50 border border-red-200 rounded-lg">
        <div class="flex items-center">
          <svg class="w-5 h-5 text-red-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <p class="text-sm text-red-600">{{ errorMessage }}</p>
        </div>
      </div>

      <!-- Variant Title -->
      <div>
        <app-basic-input
          label="Variant Title"
          placeholder="Enter variant title"
          [formControl]="$any(formGroup.get('title'))"
          [error]="!!getFieldError('title')"
          [errorMessage]="getFieldError('title')">
        </app-basic-input>
      </div>

      <!-- Variant Price -->
      <div>
        <app-basic-input
          label="Price"
          placeholder="0.00"
          type="number"
          step="0.01"
          min="0"
          [formControl]="$any(formGroup.get('price'))"
          [error]="!!getFieldError('price')"
          [errorMessage]="getFieldError('price')">
        </app-basic-input>
      </div>
      <div class="flex justify-between pt-4">
        <app-basic-button
          type="submit"
          [disabled]="formGroup.invalid || isLoading"
          [loading]="isLoading">
          Update Variant
        </app-basic-button>
      </div>
    </form>
</app-form-container>
