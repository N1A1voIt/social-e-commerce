<div class="w-full h-full bg-white p-6 rounded-3xl overflow-y-scroll hide-scrollbar relative font-mono">

  <!-- Success Message -->
  <div *ngIf="successMessage" class="mb-4 p-4 bg-green-50 border border-green-200 rounded-lg">
    <div class="flex items-center">
      <svg class="w-5 h-5 text-green-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
      </svg>
      <p class="text-sm text-green-600">{{ successMessage }}</p>
      <button
        (click)="clearMessages()"
        class="ml-auto text-green-400 hover:text-green-600">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg">
    <div class="flex items-center">
      <svg class="w-5 h-5 text-red-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <p class="text-sm text-red-600">{{ errorMessage }}</p>
      <button
        (click)="clearMessages()"
        class="ml-auto text-red-400 hover:text-red-600">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Variant List Component -->
  <app-variant-list
    [variantsList]="variants"
    [loading]="loading"
    [productId]="productId"
    (createVariant)="onCreateVariant()"
    (generateAllVariants)="onGenerateAllVariants()"
    (editVariant)="onEditVariant($event)"
    (deleteVariant)="onDeleteVariant($event)"
  >
  </app-variant-list>
  <div class="absolute bottom-1 left-1 px-4 py-2  bg-fotsy rounded-xl">{{refillMessage}}</div>

</div>
