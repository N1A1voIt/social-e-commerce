<div class="w-full flex justify-between items-center mb-3 mt-1 pl-3 font-mono">
  <div>
    <h3 class="text-lg font-semibold text-slate-800">Products</h3>
    <p class="text-slate-500">Review your products.</p>
  </div>
  <div class="mx-3">
    <div (click)="onAddProduct()" class="w-full rounded-full bg-blue-50 cursor-pointer p-3 max-w-sm font-bold  text-zinc-500 px-5" style="letter-spacing:1px" >
      Add product
    </div>
  </div>
</div>
<div class="grid grid-cols-5 gap-9" >
  <div class="group relative col-span-1 flex flex-col gap-3 border-4 border-blue-50 rounded-xl" *ngFor="let product of productsList" (click)="navigateToVariants.emit(product.idPc)">
    <img src="{{product.media}}" alt="Front of men&#039;s Basic Tee in white." class="aspect-square w-full rounded-md bg-gray-200 object-cover group-hover:opacity-75 lg:aspect-auto lg:h-80" />
    <div class="p-3 flex flex-col gap-3">
      <div class="mt-4 flex justify-between">
        <div>
          <h3 class="text-md text-gray-700">
            <p >
              <span aria-hidden="true" class="absolute inset-0"></span>
              {{ product.name }}
            </p>
          </h3>
        </div>
        <!-- Ellipsis Menu Button -->
        <div class="relative z-5">
          <i class="pi pi-ellipsis-v cursor-pointer hover:text-blue-600 p-2" (click)="toggleMenu(product.idPc, $event)"></i>

          <!-- Dropdown Menu -->
          <div *ngIf="isMenuOpen(product.idPc)" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-1 z-5">
            <ul class="text-sm p-4">
              <li class="px-4 py-2 hover:bg-gray-100 cursor-pointer flex items-center gap-2 hover:bg-blue-50 rounded-md" (click)="onEditProduct(product, $event)">
                <i class="pi pi-pencil text-green-600"></i>
                <span>Modify</span>
              </li>
              <li class="px-4 py-2 hover:bg-gray-100 cursor-pointer flex items-center gap-2 text-red-600 hover:bg-blue-50 rounded-md" (click)="onDeleteProduct(product, $event)">
                <i class="pi pi-trash"></i>
                <span>Delete</span>
              </li>
            </ul>
          </div>
        </div>

      </div>
      <div class="flex justify-between">
        <p class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800">{{ product.categoryName }}</p>
        <p class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-800">{{ product.skuPrefix }}</p>
      </div>
      <div class="flex justify-between">
        <span class="text-xl">{{ product.price | frenchNumber }} Ar</span>
        <span
          class="px-2 py-1 text-xs rounded-full"
          [ngClass]="{
            'bg-green-100 text-green-800': product.stockStatus != 'Out of stock',
            'bg-red-100 text-red-800': product.stockStatus == 'Out of stock'
          }">
          {{ product.productNumber }} {{ product.stockStatus }}
        </span>


      </div>
    </div>
  </div>
</div>
