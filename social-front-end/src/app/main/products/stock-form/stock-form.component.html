<!-- Modal Overlay -->

<div class="fixed inset-0 bg-black bg-opacity-50 flex items-end justify-end z-50">
  <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 h-full overflow-y-auto">

    <!-- Modal Header -->
    <div class="flex justify-between items-center p-6 border-b border-gray-200">
      <h2 class="text-xl font-semibold text-gray-900">Create New Variant</h2>
      <button
        (click)="onClose()"
        class="text-gray-400 hover:text-gray-600 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    <form *ngIf="!loading" [formGroup]="stockForm" (ngSubmit)="onSubmit()" class="p-6 space-y-8">

      <!-- Main Stock Entry Details (stocks_v2) -->
      <div class="space-y-4">
        <div>
          <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Description</label>
          <textarea id="description" formControlName="description" rows="3" class="w-full p-2 border border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" placeholder="e.g., Initial stock for Fall 2024 collection"></textarea>
        </div>
      </div>

      <!-- Dynamic Stock Items (stocks_child) -->
      <div class="space-y-6">
        <h2 class="text-xl font-semibold text-slate-800 border-b pb-2">Stock Items</h2>
        <div formArrayName="items" class="space-y-6">
          <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="bg-slate-50 p-4 rounded-lg border border-slate-200 relative">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
              <div class="col-span-12 ">
              <!-- Product -->
                <div class="md:col-span-3">
                  <label class="block text-xs font-medium text-slate-600 mb-1">Product</label>
                  <select formControlName="idProduct" (change)="onProductSelect(i)" class="w-full p-2 text-sm border border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                    <option [ngValue]="null" disabled>Select Product</option>
                    <option *ngFor="let product of products" [ngValue]="product.idProduct">{{ product.name }}</option>
                  </select>
                </div>

                <!-- Variant -->
                <div class="md:col-span-4">
                  <label class="block text-xs font-medium text-slate-600 mb-1">Variant</label>
                  <select formControlName="idVariant" (change)="onVariantSelect(i)" class="w-full p-2 text-sm border border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 disabled:bg-slate-200 disabled:cursor-not-allowed">
                    <option [ngValue]="null" disabled>Select Variant</option>
                    <option *ngFor="let variant of itemVariantOptions[i]" [ngValue]="variant.idVariant">{{ variant.title }}</option>
                  </select>
                </div>
              </div>
              <div class="col-span-12 grid grid-cols-2 gap-4">
                <!-- Input -->
                <div class="md:col-span-1">
                  <label class="block text-xs font-medium text-slate-600 mb-1">In</label>
                  <input type="number" formControlName="input" placeholder="0" class="w-full p-2 text-sm border border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <!-- Output -->
                <div class="md:col-span-1">
                  <label class="block text-xs font-medium text-slate-600 mb-1">Out</label>
                  <input type="number" formControlName="output" placeholder="0" class="w-full p-2 text-sm border border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>
              </div>

              <!-- Remove Button -->
              <div class="md:col-span-1 flex items-end">
                <button type="button" (click)="removeItem(i)" *ngIf="items.length > 1" class="w-full h-9 flex items-center justify-center text-slate-500 hover:text-red-600 hover:bg-red-100 rounded-md transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
              </div>

            </div>
          </div>
        </div>

        <!-- Add Item Button -->
        <div>
          <button type="button" (click)="addItem()" class="w-full text-sm font-semibold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 py-2 px-4 rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            + Add Another Product
          </button>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="flex justify-end items-center pt-6 border-t border-slate-200">
        <button type="submit" [disabled]="stockForm.invalid" class="px-6 py-2.5 bg-indigo-600 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:bg-slate-400 disabled:cursor-not-allowed">
          Save Stock Entry
        </button>
      </div>
    </form>
  </div>
</div>
