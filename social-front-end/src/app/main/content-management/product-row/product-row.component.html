<div class="flex gap-2 items-center justify-between  border border-black rounded-2xl px-4">
  <div class="flex gap-2 items-center">
    <div class="p-4 border-slate-200  ovreflow-hidden rounded-md">
      <img src="{{product.media}}" alt="Product 1" class="w-16 h-16 object-cover rounded" />
    </div>
    <div class="p-4 border-slate-200">
      <div>
        <p class="block font-semibold text-sm text-slate-800 group-hover:text-blue-600">{{ product.name }}</p>
        <p class="text-xs text-slate-500">{{ product.description }}</p>
      </div>
    </div>
  </div>
  <div class="">
    <button class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800">Attach product</button>
  </div>
</div>
