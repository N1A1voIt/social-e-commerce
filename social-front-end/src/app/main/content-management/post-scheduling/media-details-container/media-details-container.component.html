<div class="bg-gray-50 rounded-lg p-6">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-xl font-semibold text-gray-900">Media & Messages</h2>
      <p class="text-gray-600 text-sm mt-1">Add images with individual messages for your post.</p>
    </div>
    <button
      type="button"
      (click)="onAddMedia()"
      class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors">
      <svg class="w-4 h-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
      </svg>
      Add Media
    </button>
  </div>

  <div formArrayName="mediaDetails" class="space-y-6">
    <app-media-item
      *ngFor="let mediaControl of mediaDetailsArray.controls; let i = index"
      [formGroupName]="i"
      [index]="i"
      [canRemove]="mediaDetailsArray.length > 1"
      (remove)="onRemoveMedia($event)">
    </app-media-item>
  </div>

  <!-- Add Media Button (when no media items) -->
  <div *ngIf="mediaDetailsArray.length === 0"
       class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center">
    <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
    </svg>
    <p class="text-gray-600 mb-4">No media items added yet</p>
    <button
      type="button"
      (click)="onAddMedia()"
      class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
      Add First Media Item
    </button>
  </div>
</div>
