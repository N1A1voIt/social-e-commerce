
<div *ngIf="visible" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur">
  <div class="relative w-[95%] max-w-6xl h-[90vh] bg-white text-gray-900 rounded-2xl shadow-xl overflow-hidden flex flex-col">
    <!-- Header -->
    <div class="flex items-center justify-between px-4 sm:px-6 py-3 border-b bg-gray-50">
      <h2 class="text-lg sm:text-xl font-semibold">Post preview</h2>
      <button class="px-3 py-1.5 text-sm rounded-md bg-gray-200 hover:bg-gray-300 transition-colors" (click)="onClose()">Return</button>
    </div>

    <!-- Content -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 p-4 overflow-y-auto flex-1">
      <ng-container *ngFor="let item of data">
        <div class="border rounded-lg overflow-hidden bg-white shadow-sm hover:shadow-md transition-shadow h-fit">
          <div class="px-4 py-2 border-b flex items-center justify-between bg-gradient-to-r from-gray-50 to-white">
            <div class="flex items-center gap-2">
              <div class="h-8 w-8 rounded-full bg-gradient-to-br from-blue-400 to-purple-500 flex items-center justify-center text-xs uppercase font-bold text-white shadow-sm">
                {{ item.platform[0] }}
              </div>
              <span class="font-semibold capitalize">{{ item.platform }}</span>
            </div>
          </div>

          <div class="p-4 space-y-4">
            <!-- Main message -->
            <div class="whitespace-pre-line text-sm leading-relaxed">{{ item.mainMessage }}</div>
            <!-- Media carousel-like grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div *ngFor="let m of item.mediaDetails" class="border rounded-md overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                <img [src]="m.imageUrl" alt="media" class="w-full aspect-video object-cover bg-gray-100" />
                <div class="p-2 text-xs text-gray-700" *ngIf="m.message">
                  {{ m.message }}
                </div>
              </div>
            </div>
          </div>
        </div>
      </ng-container>
    </div>

    <!-- Footer: Scheduling & Actions -->
    <div class="border-t bg-gray-50 px-4 sm:px-6 py-4 space-y-4">
      <!-- Scheduling Section -->
      <div class="flex flex-col gap-3">
        <label class="flex items-center gap-3 cursor-pointer select-none group">
          <input
            type="checkbox"
            [(ngModel)]="scheduleEnabled"
            class="h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all cursor-pointer"
          />
          <span class="text-sm font-medium text-gray-700 group-hover:text-gray-900 transition-colors">
            Schedule this post
          </span>
        </label>

        <!-- DateTime Picker - appears when checkbox is checked -->
        <div
          *ngIf="scheduleEnabled"
          class="ml-8 flex flex-col gap-2 animate-fade-in"
        >
          <label class="block text-xs font-medium text-gray-600">Publish at</label>
          <input
            type="datetime-local"
            [(ngModel)]="scheduledAt"
            class="w-full max-w-xs rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-offset-1 transition-all"
            [min]="getMinDateTime()"
          />
          <p class="text-[11px] text-gray-500 flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            Time is in your local timezone
          </p>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex items-center justify-end gap-3">
        <button
          (click)="onClose()"
          class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
        >
          Cancel
        </button>
        <app-beautiful-button
          [text]="scheduleEnabled ? 'Schedule Post' : 'Publish Now'"
          (click)="onPublish()"
        ></app-beautiful-button>
      </div>
    </div>
  </div>
</div>
