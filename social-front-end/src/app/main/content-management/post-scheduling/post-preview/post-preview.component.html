
<div *ngIf="visible" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur">
  <div class="relative w-[95%] max-w-6xl h-[90vh] bg-white text-gray-900 rounded-2xl shadow-xl overflow-hidden flex flex-col">
    <!-- Header -->
    <div class="flex items-center justify-between px-4 sm:px-6 py-4 border-b-4 border-blue-50 bg-blue-50">
      <h2 class="text-xl sm:text-2xl font-bold font-mono text-gray-800">Post Preview</h2>
      <button class="px-4 py-2 text-sm font-medium rounded-lg bg-white border border-gray-300 hover:bg-gray-50 transition-colors" (click)="onClose()">Return</button>
    </div>

    <!-- Content -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 p-4 overflow-y-auto flex-1">
      <ng-container *ngFor="let item of data; let i = index">
        <div class="border-4 border-blue-50 rounded-xl overflow-hidden bg-white shadow-sm hover:shadow-lg transition-all h-fit">
          <div class="px-4 py-3 border-b-2 border-blue-100 flex items-center justify-between bg-blue-50">
            <div class="flex items-center gap-3">
              <div class="h-10 w-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-sm uppercase font-bold text-white shadow-md">
                {{ item.platform[0] }}
              </div>
              <span class="font-bold text-lg capitalize text-gray-800">{{ item.platform }}</span>
            </div>
            <!-- Edit Toggle Button -->
            <button
              (click)="toggleEdit(i)"
              class="px-4 py-2 text-sm font-semibold rounded-lg transition-all shadow-sm hover:shadow-md"
              [ngClass]="isEditing(i) ? 'bg-blue-500 text-white hover:bg-blue-600' : 'bg-white border-2 border-blue-200 text-blue-600 hover:bg-blue-50'"
            >
              <span class="flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
                </svg>
                {{ isEditing(i) ? 'Done' : 'Edit' }}
              </span>
            </button>
          </div>

          <div class="p-4 space-y-4">
            <!-- Main message -->
            <div class="relative">
              <textarea
                *ngIf="isEditing(i)"
                [(ngModel)]="item.mainMessage"
                (input)="autoResize($event)"
                class="w-full text-sm leading-relaxed border-2 border-blue-200 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none transition-all bg-blue-50"
                placeholder="Write your message here..."
                rows="3"
              ></textarea>
              <div *ngIf="!isEditing(i)" class="whitespace-pre-line text-sm leading-relaxed min-h-[3em]">
                {{ item.mainMessage || '(No message)' }}
              </div>
            </div>

            <!-- Media carousel-like grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div *ngFor="let m of item.mediaDetails; let mediaIndex = index" class="border-2 border-blue-100 rounded-lg overflow-hidden shadow-sm hover:shadow-lg transition-all bg-white relative">
                <!-- Remove button - only shown when editing -->
                <button
                  *ngIf="isEditing(i)"
                  (click)="removeMediaDetail(i, mediaIndex)"
                  class="absolute top-2 right-2 z-10 w-8 h-8 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg transition-all group"
                  title="Remove this media"
                >
                  <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                  </svg>
                </button>
                
                <img [src]="m.imageUrl" alt="media" class="w-full aspect-video object-cover bg-gray-100" />
                <div class="p-2">
                  <textarea
                    *ngIf="isEditing(i)"
                    [(ngModel)]="m.message"
                    (input)="autoResize($event)"
                    class="w-full text-xs text-gray-700 border-2 border-blue-200 rounded p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none transition-all bg-blue-50"
                    placeholder="Add a caption..."
                    rows="2"
                  ></textarea>
                  <div *ngIf="!isEditing(i) && m.message" class="text-xs text-gray-700">
                    {{ m.message }}
                  </div>
                  <div *ngIf="!isEditing(i) && !m.message" class="text-xs text-gray-400 italic">
                    No caption
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </ng-container>
    </div>

    <!-- Footer: Scheduling & Actions -->
    <div class="border-t-4 border-blue-50 bg-blue-50 px-4 sm:px-6 py-4 space-y-4">
      <!-- Scheduling Section -->
      <div class="flex flex-col gap-3">
        <label class="flex items-center gap-3 cursor-pointer select-none group bg-white border-2 border-blue-200 rounded-lg p-3 hover:bg-blue-50 transition-all">
          <input
            type="checkbox"
            [(ngModel)]="scheduleEnabled"
            class="h-5 w-5 rounded border-2 border-blue-300 text-blue-600 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all cursor-pointer"
          />
          <span class="text-sm font-semibold text-gray-800 group-hover:text-blue-700 transition-colors">
            Schedule this post
          </span>
        </label>

        <!-- DateTime Picker - appears when checkbox is checked -->
        <div
          *ngIf="scheduleEnabled"
          class="ml-8 flex flex-col gap-2 animate-fade-in"
        >
          <label class="block text-sm font-semibold text-gray-700 mb-1">Publish at</label>
          <input
            type="datetime-local"
            [(ngModel)]="scheduledAt"
            class="w-full max-w-xs rounded-lg border-2 border-blue-200 px-4 py-2.5 text-sm shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-offset-1 transition-all bg-white"
            [min]="getMinDateTime()"
          />
          <p class="text-[11px] text-gray-500 flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            Time is in your local timezone
          </p>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-col gap-3">
        <div class="flex items-center justify-end gap-3">
          <button
            (click)="onClose()"
            [disabled]="isPublishing"
            class="px-5 py-2.5 text-sm font-semibold text-gray-700 bg-white border-2 border-gray-300 rounded-lg hover:bg-gray-50 transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Cancel
          </button>
          <app-beautiful-button
            [text]="isPublishing ? 'Publishing...' : (scheduleEnabled ? 'Schedule Post' : 'Publish Now')"
            [disabled]="isPublishing"
            (click)="onPublish()"
          ></app-beautiful-button>
        </div>
        <div *ngIf="isPublishing" class="flex items-center justify-end text-blue-600">
          <i class="pi pi-spin pi-spinner text-xl mr-2"></i>
          <span class="text-sm font-medium">{{ scheduleEnabled ? 'Scheduling post...' : 'Publishing post...' }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
