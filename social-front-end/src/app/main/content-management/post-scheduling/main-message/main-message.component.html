<div class="bg-gray-50 rounded-lg p-6">
  <h2 class="text-xl font-semibold text-gray-900 mb-4">Main Message</h2>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Post Message *
    </label>
    <textarea
      [formControl]="control"
      rows="4"
      placeholder="Check out our latest products!"
      class="w-full px-3 py-2 shadow-xl  rounded-xl  focus:ring-yellow focus:border-yellow resize-none"
      [class.border-red-300]="control.invalid && control.touched">
        </textarea>
    <div class="flex justify-between text-sm mt-1">
          <span *ngIf="control.invalid && control.touched" class="text-red-600">
            Main message is required
          </span>
      <span class="text-gray-500 ml-auto">
            {{ control.value?.length || 0 }}/500 characters
          </span>
    </div>
  </div>
</div>
