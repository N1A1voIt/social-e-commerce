<div class="absolute top-0 right-0 bg-opacity-30 flex justify-center items-center backdrop-blur bg-principal w-full h-full overflow-hidden" >
  <div class="absolute top-3 right-3 font-bold cursor-pointer" (click)="onShowFormChange(false)">
    Close
  </div>
  <div class=" h-[90%] xl:w-[90%] shadow-xl bg-principal top-0 right-0 rounded-3xl z-20 grid grid-cols-2 gap-2">

    <!-- Parent column: full height + vertical flex layout -->
    <div class="col-span-1 h-full flex flex-col">
      <!-- Scrollable area that adapts to prompt height -->
      <div class="overflow-y-auto hide-scrollbar" style="flex: 1 1 auto;">
        <div *ngIf="step === 'platforms'" class="prodile-and-products flex flex-col gap-2 w-full p-4">
          <span class="text-xl font-bold font-mono">Choose on which platform you want to post</span>
          <app-platform-post-check
            *ngFor="let page of pages"
            [id]="page.platformIdentifier"
            [platform]="page.platform"
            [pageTitle]="page.pageTitle"
            [username]="page.username"
            [logo]="page.platform"
            [status]="isPageSelected(page)"
            [associatedMedia]="page.associatedMedia"
            [linkToPlatform]="page.linkToPlatform"
            (statusChange)="updateStatus(page)"
          ></app-platform-post-check>
        </div>

        <div *ngIf="step === 'products'" class="post-form flex flex-col gap-2 w-full p-4">
          <span class="text-xl font-bold font-mono">If you want to attach some products, you can do it here</span>
          <app-product-row *ngFor="let product of products" [product]="product"></app-product-row>
        </div>
      </div>

      <!-- Prompt bar stays at bottom and resizes -->
      <div class="shrink-0 border-gray-200 font-mono p-4">
        <app-prompt-form [loading]="loading"
                         (loadingChange)="onLoadingChange($event)" (formValueChange)="populateForm($event)" [(step)]="step" [products]="products"></app-prompt-form>
      </div>
    </div>


    <div class="col-span-1 overflow-y-scroll hide-scrollbar font-mono p-4"
    >
      <div *ngIf="loading"
           class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center rounded-lg">
        <div class="text-white text-center">
          <svg class="animate-spin h-8 w-8 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <p class="text-sm">Uploading...</p>
        </div>
      </div>
        <div class="mb-1" *ngIf="!loading">
          <h1 class="text-2xl font-bold text-gray-900 mb-2">Create Social Media Post</h1>
          <p class="text-gray-600">Create your social media post with images and messages.</p>
        </div>

        <form [formGroup]="postForm" (ngSubmit)="onSubmit()" class="">

          <!-- Main Message Section -->
          <app-main-message
            [control]="mainMessageControl">
          </app-main-message>
          <!-- Media Details Section -->
          <app-media-details-container
            [formGroup]="postForm"
            [mediaDetailsArray]="mediaDetailsArray"
            (addMedia)="addMediaDetail()"
            (removeMedia)="removeMediaDetail($event)">
          </app-media-details-container>

          <!-- Scheduling Section -->
          <div class="mt-4 p-3 rounded-md bg-white/40">
            <label class="flex items-center gap-2 cursor-pointer select-none">
              <input type="checkbox" formControlName="scheduledEnabled" class="h-4 w-4">
              <span class="text-sm">Schedule this post</span>
            </label>
            <div class="mt-2" *ngIf="postForm.get('scheduledEnabled')?.value">
              <label class="block text-xs text-gray-600 mb-1">Publish at</label>
              <input type="datetime-local" formControlName="scheduledAt" class="w-full rounded-md border px-2 py-1 text-sm" />
              <p class="text-[11px] text-gray-500 mt-1">Time is in your local timezone.</p>
            </div>
          </div>

          <!-- Submit Button -->
          <app-submit-button
            [disabled]="!postForm.valid"
            [isSubmitting]="isSubmitting"
            [buttonText]="postForm.get('scheduledEnabled')?.value ? 'Schedule Post' : 'Create Post'"
            [loadingText]="postForm.get('scheduledEnabled')?.value ? 'Scheduling...' : 'Creating Post...'"
            (submit)="onSubmit()">
          </app-submit-button>
        </form>

        <!-- Form Validation Summary -->
<!--        <app-form-validation-summary-->
<!--          [form]="postForm">-->
<!--        </app-form-validation-summary>-->
    </div>
  </div>

  <!-- Post preview overlay -->
  <app-post-preview
    [visible]="previewVisible"
    [data]="previewData"
    (close)="onClosePreview()"></app-post-preview>
</div>
