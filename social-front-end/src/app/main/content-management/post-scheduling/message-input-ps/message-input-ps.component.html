<div>
  <label class="block text-sm font-medium text-gray-700 mb-2">
    Image Message *
  </label>
  <textarea
    formControlName="message"
    rows="6"
    placeholder="Enter a message for this image..."
    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 resize-none"
    [class.border-red-300]="messageControl.invalid && messageControl.touched">
      </textarea>
  <div class="flex justify-between text-sm text-gray-500 mt-1">
        <span *ngIf="messageControl.invalid && messageControl.touched" class="text-red-600">
          Message is required
        </span>
    <span class="ml-auto">
          {{ messageControl.value?.length || 0 }}/200 characters
        </span>
  </div>
</div>
