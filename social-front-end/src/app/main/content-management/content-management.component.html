<div class="w-full h-full rounded-3xl p-6 bg-white">
  <div class="flex justify-between">
    <h1 class="text-2xl font-bold">Content</h1>
    <div (click)="showForm = true" class="bg-orange py-2 px-3 font-bold rounded-xl flex justify-center items-center gap-2 text-fotsy">
      <i class="pi pi-plus"></i>
      <span>Create</span>
    </div>

  </div>
  <div class="w-full mt-3 ">
    <div class="flex gap-3 items-center">
      <div class="flex items-center  px-4 gap-2 py-3 rounded-2xl border border-zinc-500 text-zinc-500 shadow-sm overflow-hidden max-w-[200px] ">
        <i class="pi pi-search"></i>
        <input type="email" placeholder="Search Something..." class="w-full outline-none bg-transparent text-gray-600 text-sm" />
      </div>
      <app-select-research></app-select-research>
      <app-select-research></app-select-research>
    </div>
  </div>
  
  <!-- Posts Grid -->
  <div class="w-full mt-3 grid grid-cols-5 gap-3" *ngIf="posts.length > 0">
    <app-post-card *ngFor="let post of posts" [post]="post" (viewChildren)="onViewPostDetails($event.post)"></app-post-card>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="posts.length === 0 && totalRecords === 0">
    <i class="pi pi-inbox"></i>
    <h3 class="text-lg font-semibold text-gray-700 mb-2">No posts yet</h3>
    <p class="text-gray-500">Create your first post to get started!</p>
  </div>
  
  <!-- Pagination -->
  <div class="w-full mt-6" *ngIf="totalRecords > 0">
    <p-paginator 
      [rows]="itemsPerPage" 
      [totalRecords]="totalRecords"
      [rowsPerPageOptions]="[5, 10, 20, 30, 50]"
      (onPageChange)="onPageChange($event)"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} posts">
    </p-paginator>
  </div>
</div>
<app-post-scheduling [(showForm)]="showForm" *ngIf="showForm"></app-post-scheduling>
