<div class="w-full h-full rounded-3xl p-6 bg-white">
  <div class="flex justify-between">
    <h1 class="text-2xl font-bold">Content</h1>
    <div (click)="showForm = true" class="bg-orange py-2 px-3 font-bold rounded-xl flex justify-center items-center gap-2 text-fotsy">
      <i class="pi pi-plus"></i>
      <span>Create</span>
    </div>
  </div>

  <!-- Filter Section -->
  <div class="w-full mt-4 bg-gray-50 rounded-lg p-4 border-4 border-blue-50">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-3">
      <!-- Title/Search Filter -->
<!--      <div class="flex flex-col gap-2">-->
<!--        <label class="text-md text-gray-700">Search Title</label>-->
<!--        <app-basic-input-->
<!--          [(ngModel)]="filterTitle"-->
<!--          placeholder="Enter title"-->
<!--          type="text">-->
<!--        </app-basic-input>-->
<!--      </div>-->

      <div class="flex flex-col gap-2">
        <label class="text-md text-gray-700">Type</label>
        <p-dropdown
          [(ngModel)]="filterType"
          [options]="typeOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="All Types"
          [showClear]="true"
          styleClass="w-full border-4 border-blue-50">
        </p-dropdown>
      </div>

      <!-- Start Date Filter -->
      <div class="flex flex-col gap-2">
        <label class="text-md text-gray-700">Start Date</label>
        <app-basic-input
          [(ngModel)]="filterStartDate"
          type="date">
        </app-basic-input>
      </div>

      <!-- End Date Filter -->
      <div class="flex flex-col gap-2">
        <label class="text-md text-gray-700">End Date</label>
        <app-basic-input
          [(ngModel)]="filterEndDate"
          type="date">
        </app-basic-input>
      </div>
    </div>

    <!-- Filter Actions -->
    <div class="flex gap-2 justify-end">
      <app-basic-button (click)="clearFilters()">
        Clear filters
      </app-basic-button>
      <app-basic-button (click)="applyFilters()">
        <i class="pi pi-filter"></i> <span> Apply filters</span>
      </app-basic-button>
    </div>
  </div>

  <!-- Loading State -->
  <div class="w-full mt-4 flex justify-center items-center py-12" *ngIf="loading">
    <i class="pi pi-spinner pi-spin text-4xl text-blue-500"></i>
  </div>

  <!-- Posts Grid -->
  <div class="w-full mt-4 grid grid-cols-5 gap-3" *ngIf="posts.length > 0 && !loading">
    <app-post-card *ngFor="let post of posts" [post]="post" (viewChildren)="onViewPostDetails($event.post)"></app-post-card>
  </div>

  <!-- Empty State -->
  <div class="w-full mt-4 flex flex-col items-center justify-center py-12" *ngIf="posts.length === 0 && totalRecords === 0 && !loading">
    <i class="pi pi-inbox text-6xl text-gray-400 mb-4"></i>
    <h3 class="text-lg font-semibold text-gray-700 mb-2">No posts yet</h3>
    <p class="text-gray-500">Create your first post to get started!</p>
  </div>

  <!-- Pagination -->
  <div class="w-full mt-6" *ngIf="totalRecords > 0 && !loading">
    <p-paginator
      [rows]="pageSize"
      [totalRecords]="totalRecords"
      [first]="currentPage * pageSize"
      (onPageChange)="onPageChange($event)">
    </p-paginator>
  </div>
</div>
<app-post-scheduling [(showForm)]="showForm" *ngIf="showForm"></app-post-scheduling>
