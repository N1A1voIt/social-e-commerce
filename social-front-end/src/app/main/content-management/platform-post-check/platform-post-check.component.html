<!-- platform-post-check.component.html -->
<div class="relative border rounded-3xl p-4 flex justify-between cursor-pointer transition-all duration-300 transform hover:scale-[1.02] hover:shadow-lg"
     [ngClass]="{
       'border-green-500 bg-gradient-to-r from-green-50 to-indigo-50 shadow-md ring-2 ring-green-200': status,
       'border-zinc-500 bg-fotsy hover:border-zinc-400 hover:bg-gray-50': !status
     }"
     (click)="updateStatus()">

  <!-- Selection indicator -->
  <div *ngIf="status"
       class="absolute -top-2 -right-2 w-6 h-6 bg-green-500 rounded-full flex items-center justify-center shadow-lg">
    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
    </svg>
  </div>

  <div class="cont-box w-full flex gap-5 justify-start mt-2">
    <div class="rounded-full w-[40px] h-[40px] bg-opacity-40 overflow-hidden ring-2 transition-all duration-300"
         [ngClass]="{
           'ring-green-300': status,
           'ring-transparent': !status
         }">
      <img width="40" [src]="associatedMedia" alt="{{ platform }}" class="w-full h-full object-cover">
    </div>
    <div class="flex flex-col" style="letter-spacing: 1px">
      <a [href]="linkToPlatform"
         target="_blank"
         class="text-md font-semibold transition-colors duration-200 hover:underline"
         [ngClass]="{
           'text-green-700': status,
           'text-gray-800 hover:text-green-600': !status
         }"
         (click)="$event.stopPropagation()">&#64;{{ pageTitle }}</a>
      <p class="text-sm transition-colors duration-200"
         [ngClass]="{
           'text-green-600': status,
           'text-gray-500': !status
         }">{{ platform }}</p>
    </div>
  </div>

  <!-- Optional: Animated background effect -->
  <div *ngIf="status"
       class="absolute inset-0 bg-gradient-to-r from-green-400/10 to-indigo-400/10 rounded-3xl opacity-50 animate-pulse">
  </div>
</div>
