<div class="w-full h-[150px] bg-fotsy rounded-3xl shadow-lg border-yellow border-">
<!--  <div class="h-1/2 w-full bg-black rounded-3xl">-->

<!--  </div>-->
  <div class="p-3 flex flex-col gap-2 h-full">
    <div class="w-full rounded-3xl flex  items-center gap-2">
      <span class="bg-orange text-orange text-sm bg-opacity-20 rounded-md  p-1 px-2" style="letter-spacing: 1px" *ngIf="post.scheduled">
        Scheduled
      </span>
      <span class="bg-green-500 text-green-500 text-sm bg-opacity-20 rounded-md  p-1 px-2" style="letter-spacing: 1px" *ngIf="!post.scheduled">
        Posted
      </span>
      <span class="bg-blue-500 text-blue-500 text-sm bg-opacity-20 rounded-md  p-1 px-2" style="letter-spacing: 1px" *ngIf="post.title">{{ post.title }}</span>
    </div>
    <div class="flex flex-col gap-3 items-start h-1/2 ">
      <h1 class="text-xl font-bold font-mono truncate">
        {{ post.description | truncate:10}}
      </h1>
    </div>
    <div class="flex items-start w-full justify-between text-sm font-mono text-zinc-500">
      <div>

        <span *ngIf="post.scheduled">Scheduled on {{ post.creationDate | date: 'dd/MM/yyyy' }}</span>
        <span *ngIf="!post.scheduled">Posted on {{ post.creationDate | date: 'dd/MM/yyyy' }}</span>
      </div>
      <span class="text-blue-500 cursor-pointer" (click)="onViewDetails()">
        <i class="pi pi-eye"></i>
      </span>
<!--      <button-->
<!--        (click)="onViewDetails()"-->
<!--        class="bg-blue-500 hover:bg-blue-600 text-white text-xs px-2 py-1 rounded-md transition-colors">-->
<!--        View Details-->
<!--      </button>-->
    </div>
  </div>

</div>
