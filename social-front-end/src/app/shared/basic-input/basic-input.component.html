<div >
  <label [for]="id" class="block text-md font-semibold font-mono  text-black ">{{ label }}</label>
  <input
    [id]="id"
    [type]="type"
    [value]="value"
    [placeholder]="placeholder"
    class= "
    text-foreground
    placeholder:text-muted-foreground
    selection:bg-primary selection:text-primary-foreground
    dark:bg-input/30 border-input
    flex h-[60px] w-full min-w-0 rounded-xl border-4 border-blue-50 px-5 py-3
    outline-none
    "
    style="letter-spacing: 1px"
    (input)="onInputChange($event)"
  />
</div>
