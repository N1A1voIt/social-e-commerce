<div >
  <label [for]="id" class="block text-sm font-mono  text-black ">{{ label }}</label>
  <input
    [id]="id"
    [type]="type"
    [value]="value"
    [placeholder]="placeholder"
    class= "
    text-black

    focus:border-blue-500 block
    w-full
    bg-transparent
    border-b border-fotsy py-1
    outline-none
    font-thin
"
    style="letter-spacing: 1px"
    (input)="onInputChange($event)"
  />
</div>
