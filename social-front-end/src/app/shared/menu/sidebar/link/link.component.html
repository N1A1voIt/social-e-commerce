<a  href="{{href}}">
  <div *ngIf="isActive" class="sm:rounded-full sm:border sm:w-[40px] sm:h-[40px] w-[60px] h-[60px] sm:bg-blackt border-b-2 border-yellow justify-center flex items-center ">
    <ng-icon name="{{icon}}"  class="text-yellow text-2xl sm:text-lg" ></ng-icon>
  </div>
  <div *ngIf="!isActive" class="rounded-full  w-[40px] h-[40px] sm:bg-white justify-center flex items-center text-black hover:bg-blackt hover:text-yellow transition-all">
    <ng-icon name="{{icon}}"  class="sm:text-lg text-2xl " ></ng-icon>
  </div>
</a>
