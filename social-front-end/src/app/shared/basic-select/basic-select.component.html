<div class="relative">
  <label [for]="id" class="block text-sm font-mono text-black">{{ label }}</label>

  <div class="relative">
    <!-- Search Input -->
    <input
      [id]="id"
      type="text"
      [value]="displayValue"
      [placeholder]="placeholder || 'Type to search...'"
      class="
        text-black
        focus:border-blue-500
        block
        w-full
        bg-transparent
        border-b border-fotsy
        py-1
        outline-none
        font-thin
        cursor-text
      "
      [class.border-red-500]="error"
      style="letter-spacing: 1px"
      (input)="onInputChange($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      (keydown)="onKeyDown($event)"
      autocomplete="off"
      >

    <!-- Dropdown Arrow -->
    <div
      class="absolute right-2 top-1/2 transform -translate-y-1/2 pointer-events-none"
      [class.rotate-180]="isOpen">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
      </svg>
    </div>
  </div>

  <!-- Dropdown Options -->
  <div
    *ngIf="isOpen && filteredOptions.length > 0"
    class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-md shadow-lg max-h-60 overflow-auto">

    <div
      *ngFor="let option of filteredOptions; let i = index"
      class="px-3 py-2 cursor-pointer hover:bg-gray-100 border-b border-gray-100 last:border-b-0"
      [class.bg-blue-50]="i === highlightedIndex"
      [class.text-blue-600]="i === highlightedIndex"
      (click)="selectOption(option)"
      (mouseenter)="highlightedIndex = i">

      <div class="font-mono text-sm">{{ option.label }}</div>
      <div *ngIf="option.description" class="text-xs text-gray-500 mt-1">
        {{ option.description }}
      </div>
    </div>
  </div>

  <!-- No results message -->
  <div
    *ngIf="isOpen && filteredOptions.length === 0 && searchTerm"
    class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-md shadow-lg">
    <div class="px-3 py-2 text-gray-500 text-sm font-mono">
      No results found for "{{ searchTerm }}"
    </div>
  </div>

  <!-- Error message -->
  <div *ngIf="error" class="mt-1 text-sm text-red-600 font-mono">
    {{ errorMessage || 'Please select a valid option' }}
  </div>
</div>
