<div
  #dateRangeDisplay
  class="inline-flex items-center gap-2 text-gray-700 text-sm border border-gray-300 rounded-xl px-4 py-2 cursor-pointer hover:bg-gray-50 focus:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent select-none transition-colors duration-200"
  (click)="openDatePicker()"
  (keydown)="onKeyDown($event)"
  role="button"
  tabindex="0"
  [attr.aria-label]="'Date range selector. Currently selected from ' + formattedStart + ' to ' + formattedEnd"
  [attr.aria-expanded]="false"
>
  <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
  </svg>
  <span *ngIf="formattedStart && formattedEnd; else placeholderText">
    From {{ formattedStart }} to {{ formattedEnd }}
  </span>
  <ng-template #placeholderText>
    <span class="text-gray-500">{{ placeholder }}</span>
  </ng-template>
</div>
