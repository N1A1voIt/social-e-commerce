<div>
  <label class="block text-sm font-medium text-gray-700 mb-2">
    Image *
  </label>

  <!-- Hidden File Input -->
  <input
    #fileInput
    type="file"
    accept="image/*"
    (change)="onFileInputChange($event)"
    class="hidden">

  <!-- Custom File Picker -->
  <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-gray-400 transition-colors cursor-pointer"
       (click)="fileInput.click()">
    <div *ngIf="!previewUrl && !imageUrl" class="space-y-2">
      <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <div class="text-gray-600">
        <span class="text-blue-600 hover:text-blue-500 font-medium">Choose an image</span>
        <span class="text-gray-500"> or drag and drop</span>
      </div>
      <p class="text-xs text-gray-500">PNG, JPG, GIF up to 10MB</p>
    </div>

    <!-- Image Preview -->
    <div *ngIf="previewUrl || imageUrl" class="space-y-4">
      <div class="relative inline-block">
        <img
          [src]="previewUrl || imageUrl"
          alt="Media preview"
          class="max-w-full max-h-48 rounded-lg shadow-md">

        <!-- Loading Overlay -->
        <div *ngIf="isUploading"
             class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center rounded-lg">
          <div class="text-white text-center">
            <svg class="animate-spin h-8 w-8 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-sm">Uploading...</p>
          </div>
        </div>
      </div>

      <div class="flex justify-center space-x-2">
        <button
          type="button"
          (click)="fileInput.click(); $event.stopPropagation()"
          [disabled]="isUploading"
          class="px-3 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50 transition-colors">
          Change Image
        </button>
        <button
          type="button"
          (click)="onRemoveFile($event)"
          [disabled]="isUploading"
          class="px-3 py-1 text-sm bg-red-600 text-white rounded hover:bg-red-700 disabled:opacity-50 transition-colors">
          Remove
        </button>
      </div>
    </div>
  </div>

  <!-- Upload Error -->
  <div *ngIf="uploadError" class="mt-2 text-sm text-red-600">
    {{ uploadError }}
  </div>

  <!-- Validation Error -->
  <div *ngIf="formGroup.get('imageUrl')?.invalid && formGroup.get('imageUrl')?.touched"
       class="mt-2 text-sm text-red-600">
    Image is required
  </div>
</div>
