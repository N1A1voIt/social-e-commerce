<div class="container mx-auto p-4 max-w-3xl">
  <h1 class="text-2xl font-bold mb-6">Checkout</h1>

  <!-- Loading Indicator -->
  <div *ngIf="loading" class="text-center py-8">
    <p>Loading checkout details...</p>
  </div>

  <!-- Error Message -->
  <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    <p>{{ error }}</p>
  </div>

  <!-- Checkout Details -->
  <div *ngIf="!loading && cart" class="bg-white rounded-lg shadow-md p-6">
    <h2 class="text-xl font-semibold mb-4">Order Summary for Seller: {{ cart.sellerName }}</h2>

    <!-- Cart Items -->
    <div class="mb-6">
      <div *ngFor="let item of cart.items" class="flex justify-between items-center border-b py-3 last:border-b-0">
        <div>
          <p class="font-medium">{{ item.productName }}</p>
          <p class="text-sm text-gray-600">{{ item.variantTitle }}</p>
          <p class="text-sm text-gray-500">Quantity: {{ item.quantity }}</p>
        </div>
        <p class="font-semibold">${{ item.totalPrice | number:'1.2-2' }}</p>
      </div>
    </div>

    <!-- Total -->
    <div class="border-t pt-4 flex justify-between items-center font-bold text-lg">
      <span>Total</span>
      <span>${{ cart.totalPrice | number:'1.2-2' }}</span>
    </div>

    <!-- Action Buttons -->
    <div class="mt-8 flex justify-end space-x-4">
      <button (click)="goBack()" class="px-6 py-2 border rounded-md text-gray-700 hover:bg-gray-100">
        Cancel
      </button>
      <button (click)="confirmCheckout()" class="px-6 py-2 bg-yellow text-fotsy rounded-md hover:bg-yellow-dark">
        Confirm Checkout
      </button>
    </div>
  </div>

  <!-- No Cart Found -->
  <div *ngIf="!loading && !cart && !error" class="text-center py-8">
    <p>Could not load cart details.</p>
  </div>
</div>
