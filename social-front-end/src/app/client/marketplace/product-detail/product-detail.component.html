<div class="w-full max-w-5xl md:h-[60vh] h-screen mx-auto  flex flex-col md:flex-row gap-4 rounded-2xl shadow-lg p-4 ">
  <!-- Images Section -->
  <div class="md:hidden w-full flex justify-start items-center">
    <div class="bg-white rounded-xl flex items-center justify-center gap-1 px-2 h-[40px] w-[40px] text-blackt">
      <i class="pi pi-arrow-left"></i>
    </div>
  </div>
  <div class="flex flex-col gap-4 md:w-1/2 bg-red-50">
    <div class="w-full h-full aspect-square bg-gray-100 rounded-xl flex items-center justify-center overflow-hidden">
      <img [src]="selectedImage" alt="Product image" class="object-cover w-full h-full" />
    </div>
  </div>

  <!-- Product Info Section -->
  <div class="flex-1 flex flex-col gap-1 font-mono">
    <h1 class="text-xl md:text-3xl font-bold text-gray-900">{{product.name}}</h1>
    <div class="text-xl text-yellow-500 font-bold">${{product.price}}</div>
    <div class="text-gray-700 text-sm">{{product.description}}</div>
    <div class="mt-2 flex flex-col items-start gap-2">
        <div class="font-semibold text-gray-800">Seller: {{product.seller.name}}</div>
        <div class="flex items-center gap-2 text-sm text-gray-500">
          <span>Rating: {{product.seller.rating}} ★</span>
        </div>
        <div class="grid grid-cols-2 gap-2 w-full">
          <button class="rounded-full col-span-1 border border-yellow text-yellow px-4 py-2"> Add to Cart </button>
          <button class="rounded-full col-span-1 border bg-yellow text-fotsy px-4 py-2"> Contact seller</button>
        </div>
    </div>
  </div>
</div>
