<div class="w-full h-[350px] bg-fotsy rounded-3xl shadow-lg border-yellow border- cursor-pointer" (click)="goToDetail()">
  <div class="h-4/6 w-full bg-black rounded-3xl overflow-hidden">
    <img [src]="product?.media || 'assets/imgs/gustavo.jpeg'" class="object-cover w-full h-full" alt="{{product?.name}}">
  </div>
  <div class="p-2 px-3 flex flex-col gap-1 h-2/6">
    <div class="flex flex-col gap-3 items-start w-full max-w-sm overflow-hidden">
      <h1 class="text-xl font-bold font-mono truncate w-full whitespace-nowrap overflow-hidden text-ellipsis">
        {{product?.name || 'Product Name'}}
      </h1>
    </div>
    <div>
      <span class="font-bold text-xl font-mono">{{product?.price || 'N/A'}} Ar</span>
    </div>
    <div class="flex gap-2 items-start w-full justify-end text-sm font-mono text-zinc-500">
      <div class="bg-white rounded-xl flex items-center justify-center gap-1 px-2 h-[30px]">
        <i class="pi pi-shopping-cart"></i>
      </div>
      <div class="bg-white rounded-xl flex items-center justify-center gap-1 px-2 h-[30px]">
        <i class="pi pi-heart"></i>
      </div>
    </div>
  </div>
</div>
