spring.application.name=demo

# Firebase Configuration
firebase.credential.path=firebase-account-service.json

spring.datasource.url=jdbc:postgresql://localhost:5436/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.docker.compose.enabled=false
# OAuth Configuration for Social Media Platforms
oauth.platforms.facebook.client-id=${FACEBOOK_CLIENT_ID:your-facebook-client-id}
oauth.platforms.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}
oauth.platforms.facebook.redirect-uri=${BASE_URL:http://localhost:8080}/api/oauth/facebook/callback
oauth.platforms.facebook.scopes=pages_manage_posts,pages_read_engagement
oauth.platforms.facebook.authorization-url=https://www.facebook.com/v18.0/dialog/oauth
oauth.platforms.facebook.token-url=https://graph.facebook.com/v18.0/oauth/access_token
oauth.platforms.facebook.user-info-url=https://graph.facebook.com/v18.0/me/accounts
oauth.platforms.facebook.revoke-url=https://graph.facebook.com/v18.0/me/permissions

oauth.platforms.instagram.client-id=${INSTAGRAM_CLIENT_ID:your-instagram-client-id}
oauth.platforms.instagram.client-secret=${INSTAGRAM_CLIENT_SECRET:your-instagram-client-secret}
oauth.platforms.instagram.redirect-uri=${BASE_URL:http://localhost:8080}/api/oauth/instagram/callback
oauth.platforms.instagram.scopes=instagram_basic,instagram_content_publish
oauth.platforms.instagram.authorization-url=https://api.instagram.com/oauth/authorize
oauth.platforms.instagram.token-url=https://api.instagram.com/oauth/access_token
oauth.platforms.instagram.user-info-url=https://graph.instagram.com/me
oauth.platforms.instagram.revoke-url=https://graph.instagram.com/oauth/revoke

oauth.platforms.x.client-id=${X_CLIENT_ID:your-x-client-id}
oauth.platforms.x.client-secret=${X_CLIENT_SECRET:your-x-client-secret}
oauth.platforms.x.redirect-uri=${BASE_URL:http://localhost:8080}/api/oauth/x/callback
oauth.platforms.x.scopes=tweet.read,tweet.write,users.read
oauth.platforms.x.authorization-url=https://twitter.com/i/oauth2/authorize
oauth.platforms.x.token-url=https://api.twitter.com/2/oauth2/token
oauth.platforms.x.user-info-url=https://api.twitter.com/2/users/me
oauth.platforms.x.revoke-url=https://api.twitter.com/2/oauth2/revoke