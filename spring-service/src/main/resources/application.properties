spring.application.name=demo

# Firebase Configuration
firebase.credential.path=firebase-account-service.json

spring.datasource.url=jdbc:postgresql://localhost:5437/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

facebook.appId=3273806436099805
facebook.redirect_uri=https://8c919e29b315.ngrok-free.app/api/auth/facebook/callback
facebook.secret=${FACEBOOK_SECRET_KEY}
facebook.token.expiration=30

front-end.prefix=http://localhost:4200

instagram.appId=603679482521142
instagram.redirect_uri=https://8c919e29b315.ngrok-free.app/api/auth/instagram/callback
instagram.secret=${INSTAGRAM_SECRET_KEY}
instagram.token.expiration=30

x.scopes=tweet.read users.read offline.access tweet.write
x.appId=30498132
x.auth_id=${X_AUTH_CLIENT_ID}
x.redirect_uri=https://8c919e29b315.ngrok-free.app/api/auth/x/callback
x.code_verifier=${X_CODE_VERIFIER}
x.code_challenge=${X_CODE_CHALLENGE}
x.secret=${X_API_KEY}
x.token.expiration=30
x.clentsecret=${X_OAUTH_SECRET}

# application.properties
messenger.verify_token=${MESSENGER_WEBHOOK_TOKEN}


spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=root

spring.docker.compose.enabled=false
