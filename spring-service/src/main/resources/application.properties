spring.application.name=demo

# Firebase Configuration
firebase.credential.path=firebase-account-service.json

spring.datasource.url=jdbc:postgresql://localhost:5436/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

facebook.appId=1751182115605124
facebook.redirect_uri=https://363b4f1472af.ngrok-free.app/api/auth/facebook/callback
facebook.secret=${FACEBOOK_SECRET_KEY}
facebook.token.expiration=30

instagram.appId=717173677696596
instagram.redirect_uri=https://363b4f1472af.ngrok-free.app/api/auth/instagram/callback
instagram.secret=${INSTAGRAM_SECRET_KEY}
instagram.token.expiration=30

# application.properties



spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=root

spring.docker.compose.enabled=false
