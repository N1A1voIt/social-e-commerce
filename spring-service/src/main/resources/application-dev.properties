# Development Environment Configuration

# Database Configuration for Development
spring.datasource.url=jdbc:postgresql://localhost:5436/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

# Enable SQL logging in development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Development OAuth URLs
oauth.platforms.facebook.redirect-uri=http://localhost:8080/api/oauth/facebook/callback
oauth.platforms.instagram.redirect-uri=http://localhost:8080/api/oauth/instagram/callback
oauth.platforms.x.redirect-uri=http://localhost:8080/api/oauth/x/callback

# Development Token Encryption (use a simple key for dev)
token.encryption.key=DevEncryptionKey123456789012345

# Scheduled Task Configuration for Development
oauth.token.rotation.enabled=true
oauth.token.rotation.fixed-rate=3600000
oauth.token.rotation.initial-delay=60000
oauth.token.rotation.expiration-threshold-hours=24

# Rate Limiting Configuration
oauth.rate-limit.enabled=true
oauth.rate-limit.requests-per-minute=60
oauth.rate-limit.burst-capacity=100

# Retry Configuration
oauth.retry.max-attempts=3
oauth.retry.initial-delay=1000
oauth.retry.multiplier=2.0
oauth.retry.max-delay=10000

# Security Configuration
oauth.state.expiration-minutes=10
oauth.csrf.enabled=true

# Logging Configuration for Development
logging.level.com.itu.socialcom.demo.socialmedia=DEBUG
logging.level.org.springframework.security=DEBUG