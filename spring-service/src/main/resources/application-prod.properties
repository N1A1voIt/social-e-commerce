# Production Environment Configuration

# Database Configuration for Production
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Disable SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Production OAuth URLs
oauth.platforms.facebook.redirect-uri=${BASE_URL}/api/oauth/facebook/callback
oauth.platforms.instagram.redirect-uri=${BASE_URL}/api/oauth/instagram/callback
oauth.platforms.x.redirect-uri=${BASE_URL}/api/oauth/x/callback

# Production Token Encryption (must be provided via environment)
token.encryption.key=${TOKEN_ENCRYPTION_KEY}

# Scheduled Task Configuration for Production
oauth.token.rotation.enabled=true
oauth.token.rotation.fixed-rate=1800000
oauth.token.rotation.initial-delay=300000
oauth.token.rotation.expiration-threshold-hours=48

# Rate Limiting Configuration
oauth.rate-limit.enabled=true
oauth.rate-limit.requests-per-minute=30
oauth.rate-limit.burst-capacity=50

# Retry Configuration
oauth.retry.max-attempts=5
oauth.retry.initial-delay=2000
oauth.retry.multiplier=2.0
oauth.retry.max-delay=30000

# Security Configuration
oauth.state.expiration-minutes=5
oauth.csrf.enabled=true

# Logging Configuration for Production
logging.level.com.itu.socialcom.demo.socialmedia=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN